name: proofpilot-ai

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: proofpilot
      POSTGRES_USER: proofpilot
      POSTGRES_PASSWORD: proofpilot
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofpilot -d proofpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.16.0
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
